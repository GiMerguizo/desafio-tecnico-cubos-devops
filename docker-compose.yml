version: "3.8"

services:
  postgres:
    image: postgres:15.8
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/script.sql:/docker-entrypoint-initdb.d/script.sql

  backend:
    build: ./backend
    container_name: backend_app
    restart: always
    environment:
      port: 3000
      user: myuser
      pass: mypass
      host: postgres
      db_port: 5432/mydb
    depends_on:
      - postgres

  frontend:
    build: 
      context: ./frontend
    container_name: frontend_app
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
