global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout:      10s


scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend_app'
    static_configs:
      - targets: ['backend_app:3000']

  - job_name: 'nginx_exporter'
    static_configs:
      - targets: ['nginx_exporter:9113'] # Aponta para o nome do serviço do novo exporter